name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Import signing certificate
        if: env.CERTIFICATE_P12 != ''
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          echo "$CERTIFICATE_P12" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Build Release (signed)
        if: env.CERTIFICATE_P12 != ''
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
        run: |
          xcodebuild build \
            -project ClipboardManager.xcodeproj \
            -scheme ClipboardManager \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            -destination 'platform=macOS' \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application"

      - name: Build Release (unsigned)
        if: env.CERTIFICATE_P12 == ''
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
        run: |
          xcodebuild build \
            -project ClipboardManager.xcodeproj \
            -scheme ClipboardManager \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO

      - name: Run Tests
        run: |
          xcodebuild test \
            -project ClipboardManager.xcodeproj \
            -scheme ClipboardManagerTests \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO

      - name: Create DMG
        run: |
          APP_PATH="build/DerivedData/Build/Products/Release/ClipboardManager.app"
          DMG_NAME="ClipboardManager-${{ steps.version.outputs.VERSION }}.dmg"

          mkdir -p build/dmg
          cp -R "$APP_PATH" build/dmg/
          ln -s /Applications build/dmg/Applications

          hdiutil create -volname "ClipboardManager" \
            -srcfolder build/dmg \
            -ov -format UDZO \
            "build/$DMG_NAME"

      - name: Notarize DMG
        if: env.NOTARY_APPLE_ID != ''
        env:
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
          NOTARY_TEAM_ID: ${{ secrets.NOTARY_TEAM_ID }}
        run: |
          DMG_NAME="ClipboardManager-${{ steps.version.outputs.VERSION }}.dmg"
          xcrun notarytool submit "build/$DMG_NAME" \
            --apple-id "$NOTARY_APPLE_ID" \
            --password "$NOTARY_PASSWORD" \
            --team-id "$NOTARY_TEAM_ID" \
            --wait
          xcrun stapler staple "build/$DMG_NAME"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ClipboardManager v${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            build/ClipboardManager-${{ steps.version.outputs.VERSION }}.dmg
